name: Traffic Data Ingestion (Python)

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:

concurrency:
  group: dsai-main-writers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest_python:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: CHECK FILE SIZE LIMITS
        run: |
          set -euo pipefail
          FILE="12_end/data/traffic.db"
          MAX_MB=95
          if [ -f "$FILE" ]; then
            SIZE_BYTES=$(wc -c < "$FILE")
            SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
            echo "File: $FILE | Size: ${SIZE_MB} MB | Limit: ${MAX_MB} MB"
            if [ "$SIZE_BYTES" -gt $((MAX_MB * 1024 * 1024)) ]; then
              echo "ERROR: $FILE exceeds ${MAX_MB} MB. Stop run before ingest."
              exit 1
            fi
          else
            echo "File not found yet (skip): $FILE"
          fi

      - name: SETUP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: CACHE PIP PACKAGES
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ingest-${{ hashFiles('.github/workflows/12-ingest-python.yml', '12_end/01_ingest_traffic.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-ingest-
            ${{ runner.os }}-pip-

      - name: INSTALL PYTHON DEPENDENCIES
        run: pip install requests pandas

      - name: RUN INGESTION JOB
        working-directory: 12_end
        run: python 01_ingest_traffic.py
        
      - name: COMMIT CHANGES
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/traffic.db
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: ingest traffic data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
