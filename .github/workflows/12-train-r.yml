name: Model Training Job (R)

on:
  schedule:
    - cron: '0 7 * * 1'   # weekly on Mondays at 7am UTC
  workflow_dispatch:        # allow manual trigger

concurrency:
  group: dsai-main-writers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train_r:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: CHECK FILE SIZE LIMITS
        run: |
          set -euo pipefail
          check_size_mb() {
            FILE="$1"
            MAX_MB="$2"
            if [ -f "$FILE" ]; then
              SIZE_BYTES=$(wc -c < "$FILE")
              SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
              echo "File: $FILE | Size: ${SIZE_MB} MB | Limit: ${MAX_MB} MB"
              if [ "$SIZE_BYTES" -gt $((MAX_MB * 1024 * 1024)) ]; then
                echo "ERROR: $FILE exceeds ${MAX_MB} MB. Stop run before training."
                exit 1
              fi
            else
              echo "File not found yet (skip): $FILE"
            fi
          }
          check_size_mb "12_end/data/modelr.json" 95
          check_size_mb "12_end/data/validationr.json" 95

      - name: SETUP R
        uses: r-lib/actions/setup-r@v2

      - name: SET USER LIBRARY PATH FOR CACHE
        run: echo "R_LIBS_USER=${HOME}/.cache/R/gha-library" >> $GITHUB_ENV

      - name: CACHE R PACKAGES
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-lib-train-${{ hashFiles('.github/workflows/12-train-r.yml', '12_end/02_train_model.R') }}
          restore-keys: |
            ${{ runner.os }}-r-lib-train-
            ${{ runner.os }}-r-lib-

      - name: SETUP DEPENDENCIES
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RSQLite
            any::dplyr
            any::lubridate
            any::xgboost

      - name: RUN TRAINING SCRIPT
        working-directory: 12_end
        run: Rscript 02_train_model.R

      - name: COMMIT CHANGES
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/modelr.json 12_end/data/validationr.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: train r model $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
